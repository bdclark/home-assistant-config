version: v2beta1
name: home-assistant
dev:
  ha-config:
    namespace: iot
    labelSelector:
      app.kubernetes.io/name: home-assistant
    container: home-assistant
    sync:
      - path: ./config:/config
        excludePaths:
          - .bash_history
          - .bootstrapped
          - .cache/
          - .cloud/
          - .config/
          - .devspace/
          - .git/
          - .ha_run.lock
          - .HA_VERSION
          - .storage/
          - .local/
          - backups/
          - custom_components/
          - www/community/
          - "!www/community/streamline-card/streamline_templates.yaml"
          - "*.crt"
          - deps/
          - "*.key"
          - "*.pem"
          - home-assistant_v2.db*
          - home-assistant.log*
          - lost+found/
          - secrets.yaml # Managed by Kubernetes secrets
          - tts/
          # - bubble_card/
        uploadExcludePaths:
          - www/sounds/
        initialSync: preferNewest
    terminal:
      enabled: false
