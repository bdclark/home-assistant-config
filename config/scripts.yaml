avr_turn_on_with_source:
  alias: AVR - Turn On with Source
  description: Powers on the TX-RZ830 and selects a source, waiting for it to be ready
    before switching input.
  icon: mdi:audio-video
  mode: restart
  fields:
    source:
      name: Source
      description: The input source to select (e.g. Shield, Apple TV, TV)
      required: true
      example: Shield
      selector:
        select:
          options:
          - CBL/SAT
          - Shield
          - AUX
          - PC
          - BD/DVD
          - Apple TV
          - TV
          - PHONO
          - Sonos
          - TUNER
          - NETWORK
          - BLUETOOTH
  sequence:
  - action: media_player.turn_on
    target:
      entity_id: media_player.tx_rz830
  - wait_template: '{{ is_state(''media_player.tx_rz830'', ''on'') }}'
    timeout: 00:00:15
    continue_on_timeout: false
  - action: media_player.select_source
    target:
      entity_id: media_player.tx_rz830
    data:
      source: '{{ source }}'
atv_turn_on_with_source:
  alias: ATV - Turn On with Source
  description: Wakes an Apple TV and selects a source, waiting for it to leave standby
    before switching input.
  icon: mdi:apple
  mode: parallel
  max: 5
  fields:
    atv_entity_id:
      name: Entity ID
      description: The Apple TV media player entity to control
      required: true
      example: media_player.living_room_apple_tv
      selector:
        entity:
          domain: media_player
    source:
      name: Source
      description: The app/source to launch (e.g. Netflix, Disney+, YouTube)
      required: true
      example: Netflix
      selector:
        text: {}
  sequence:
  - action: media_player.turn_on
    target:
      entity_id: '{{ atv_entity_id }}'
  - wait_template: '{{ not is_state(atv_entity_id, ''standby'') }}'
    timeout: 00:00:20
    continue_on_timeout: false
  - action: media_player.select_source
    target:
      entity_id: '{{ atv_entity_id }}'
    data:
      source: '{{ source }}'
shield_launch_plex:
  alias: Shield - Launch Plex
  description: Reliably launches Plex on the NVIDIA Shield regardless of current power
    state. Wakes the device, waits until ready, then launches the Plex app.
  icon: mdi:plex
  mode: single
  sequence:
  - action: media_player.turn_on
    target:
      entity_id: media_player.living_room_shield_android_remote
  - wait_template: '{{ not is_state(''media_player.living_room_shield_android_remote'',
      ''off'') }}'
    timeout: 00:00:30
    continue_on_timeout: false
  - delay:
      milliseconds: 500
  - action: media_player.play_media
    target:
      entity_id: media_player.living_room_shield_android_remote
    data:
      media_content_type: app
      media_content_id: com.plexapp.android
living_room_all_off:
  alias: Living Room - All Off
  description: Powers down the living room AV chain in the correct order. TV first
    to kill CEC, then sources, then AVR. Only sends commands to devices that are actually
    on.
  icon: mdi:power
  mode: single
  sequence:
  - alias: Turn off TV first (kills CEC chain)
    if:
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.living_room_tv_android_remote
        state: 'off'
    then:
    - action: media_player.turn_off
      target:
        entity_id: media_player.living_room_tv_android_remote
  - alias: Wait for TV to confirm off
    wait_for_trigger:
    - trigger: state
      entity_id: media_player.living_room_tv_android_remote
      to: 'off'
    timeout:
      seconds: 15
    continue_on_timeout: true
  - alias: Turn off Shield (only if on)
    if:
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.living_room_shield_android_remote
        state: 'off'
    then:
    - action: media_player.turn_off
      target:
        entity_id: media_player.living_room_shield_android_remote
  - alias: Turn off Apple TV (only if on)
    if:
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.living_room_apple_tv
        state: 'off'
    then:
    - action: media_player.turn_off
      target:
        entity_id: media_player.living_room_apple_tv
  - alias: Wait for Shield to confirm off
    wait_for_trigger:
    - trigger: state
      entity_id: media_player.living_room_shield_android_remote
      to: 'off'
    timeout:
      seconds: 20
    continue_on_timeout: true
  - alias: Turn off AVR last (only if on)
    if:
    - condition: not
      conditions:
      - condition: state
        entity_id: media_player.tx_rz830
        state: 'off'
    then:
    - action: media_player.turn_off
      target:
        entity_id: media_player.tx_rz830
light_ensure_minimum_brightness:
  alias: Light - Ensure Minimum Brightness
  description: Turns a light on at a minimum brightness percent if it is off or below
    the minimum. If already on at or above the minimum brightness, does nothing. Optionally
    applies a transition.
  icon: mdi:brightness-5
  mode: parallel
  max: 10
  fields:
    light_entity:
      name: Light Entity
      description: The light entity to control
      required: true
      example: light.living_room
      selector:
        entity:
          domain: light
    min_brightness_pct:
      name: Minimum Brightness %
      description: Minimum brightness percentage (1-100)
      required: true
      example: 30
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: '%'
    transition:
      name: Transition
      description: Transition time in seconds (optional)
      required: false
      example: 2
      selector:
        number:
          min: 0
          max: 30
          unit_of_measurement: s
  sequence:
  - if:
    - condition: template
      value_template: '{{ states(light_entity) == ''off'' or (state_attr(light_entity,
        ''brightness'') | default(0) / 2.55) | round(0) < min_brightness_pct }}'
    then:
    - action: light.turn_on
      target:
        entity_id: '{{ light_entity }}'
      data:
        brightness_pct: '{{ min_brightness_pct }}'
        transition: '{{ transition if transition is defined else omit }}'
lgtv_turn_on_with_source:
  alias: LGTV - Turn On with Source
  description: Wakes an LG TV and selects a source, waiting for it to leave off or
    unavailable before launching app.
  icon: mdi:television
  mode: parallel
  max: 5
  fields:
    lgtv_entity_id:
      name: Entity ID
      description: The LG TV media player entity to control
      required: true
      example: media_player.master_bedroom_tv
      selector:
        entity:
          domain: media_player
    source:
      name: Source
      description: The app/source to launch (e.g. YouTube, HBO Max, Peacock)
      required: true
      example: YouTube
      selector:
        text: {}
  sequence:
  - action: media_player.turn_on
    target:
      entity_id: '{{ lgtv_entity_id }}'
  - wait_template: '{{ states(lgtv_entity_id) not in [''off'', ''unavailable'', ''unknown'']
      }}'
    continue_on_timeout: false
    timeout: 00:00:60
  - delay: 00:00:02
  - action: media_player.select_source
    target:
      entity_id: '{{ lgtv_entity_id }}'
    data:
      source: '{{ source }}'
doorbell_announce:
  alias: Doorbell Announcement
  description: Plays a doorbell announcement on Music Assistant players. Fire Pit
    is excluded late at night. Sonos Move and Living Room are permanently excluded.
  icon: mdi:doorbell
  mode: restart
  fields:
    sound_url:
      name: Sound URL
      description: URL of the announcement sound to play
      required: false
      default: https://ha.clark.zone/local/sounds/mysterious-ringtone.mp3
      selector:
        text: {}
  sequence:
  - variables:
      target_players: "{% set players = namespace(list=[]) %}\n{% set players.list
        = players.list + ['media_player.kitchen_mass'] %}\n{% set players.list = players.list
        + ['media_player.patio_mass'] %}\n{% set players.list = players.list + ['media_player.master_bedroom_mass']
        %}\n{% set players.list = players.list + ['media_player.master_bath_mass']
        %}\n{% set players.list = players.list + ['media_player.guest_bath_mass']
        %}\n{% if now().hour >= 8 and now().hour < 21 %}\n  {% set players.list =
        players.list + ['media_player.fire_pit_mass'] %}\n{% endif %}\n{{ players.list
        }}"
  - action: music_assistant.play_announcement
    data:
      url: '{{ sound_url | default(''https://ha.clark.zone/local/sounds/mysterious-ringtone.mp3'')
        }}'
    target:
      entity_id: '{{ target_players }}'
toggle_lutron_light:
  alias: Toggle Lutron Light
  description: Toggles a Lutron light with solar elevation-aware default brightness
    and optional scaling. If the entity is on, turns it off. If off, turns it on with
    brightness logic for lights and domain-safe on behavior for switches.
  icon: mdi:lightbulb-auto
  mode: parallel
  max: 20
  fields:
    entity_id:
      name: Entity ID
      description: The light or switch entity to toggle
      required: true
      selector:
        entity:
          domain:
          - light
          - switch
    brightness_override:
      name: Brightness Override
      description: Optional brightness (0-255). If set above 0, this value is used
        instead of solar-derived brightness.
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 255
          step: 1
    scale_factor:
      name: Scale Factor
      description: Optional multiplier for solar-derived brightness (ignored when
        brightness override is set).
      required: false
      default: 1
      selector:
        number:
          min: 0.5
          max: 1.5
          step: 0.05
  sequence:
  - alias: Turn off if on
    if:
    - condition: template
      value_template: '{{ is_state(entity_id, ''on'') }}'
    then:
    - action: homeassistant.turn_off
      target:
        entity_id: '{{ entity_id }}'
    else:
    - alias: Resolve target brightness
      variables:
        elevation: '{{ states(''sensor.home_sun_elevation'') | float(0) }}'
        base_solar_brightness: '{% if elevation > 30 %}191{% elif elevation > 5 %}140{%
          elif elevation > -6 %}89{% else %}51{% endif %}'
        resolved_scale_factor: '{{ scale_factor | default(1, true) | float(1) }}'
        scaled_solar_brightness: '{{ (base_solar_brightness | float * resolved_scale_factor)
          | round(0) | int }}'
        clamped_solar_brightness: '{{ [255, [20, scaled_solar_brightness] | max] |
          min }}'
        target_brightness: '{{ (brightness_override | int) if (brightness_override
          is defined and (brightness_override | int) > 0) else clamped_solar_brightness
          }}'
    - alias: Turn on by domain
      choose:
      - conditions:
        - condition: template
          value_template: '{{ entity_id.startswith(''light.'') }}'
        sequence:
        - action: light.turn_on
          target:
            entity_id: '{{ entity_id }}'
          data:
            brightness: '{{ target_brightness | int }}'
      - conditions:
        - condition: template
          value_template: '{{ entity_id.startswith(''switch.'') }}'
        sequence:
        - action: switch.turn_on
          target:
            entity_id: '{{ entity_id }}'
      default:
      - action: homeassistant.turn_on
        target:
          entity_id: '{{ entity_id }}'
master_suite_all_off:
  alias: Master Suite - All Off
  description: Turns off all lights and switches in master bedroom and master bath
    areas.
  icon: mdi:bed-clock
  mode: single
  sequence:
  - action: light.turn_off
    target:
      area_id:
      - master_bedroom
      - master_bath
