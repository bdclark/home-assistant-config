- binary_sensor:
    - name: "Kitchen Lights On"
      unique_id: "kitchen_lights_on"
      device_class: light
      state: >
        {{ expand(area_entities('kitchen'))
           | selectattr('domain', 'eq', 'light')
           | selectattr('state', 'eq', 'on')
           | list | count > 0
           or
           expand(label_entities('light_switch')
           | select('in', area_entities('kitchen')) | list)
           | selectattr('state', 'eq', 'on')
           | list | count > 0 }}

