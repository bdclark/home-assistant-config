- sensor:
    - name: "Lights On Counter"
      unique_id: "lights_on_counter"
      icon: mdi:lightbulb-group
      state: >
        {{
          (
            states.light
            | rejectattr('attributes.entity_id', 'defined')
            | rejectattr('entity_id', 'in', expand(label_entities('light_fixture_member')) | map(attribute='entity_id') | list)
            | rejectattr('entity_id', 'in', expand(label_entities('light_fixture_group')) | map(attribute='entity_id') | list)
            | selectattr('state', 'eq', 'on')
            | list | count
          )
          +
          (
            expand(label_entities('light_fixture_group'))
            | selectattr('state', 'eq', 'on')
            | list | count
          )
          +
          (
            expand(label_entities('light_switch'))
            | selectattr('state', 'eq', 'on')
            | list | count
          )
        }}

    - name: "Fans On Counter"
      unique_id: "fans_on_counter"
      icon: mdi:fan
      state: >
        {{ expand(label_entities('fan_switch'))
           | selectattr('state', 'eq', 'on')
           | list | count }}

    - name: "Ceiling Fans On Counter"
      unique_id: "ceiling_fans_on_counter"
      icon: mdi:ceiling-fan
      state: >
        {{ expand(label_entities('ceiling_fan'))
           | selectattr('state', 'eq', 'on')
           | list | count }}

- sensor:
    - name: "Workshop HVAC Action"
      unique_id: "workshop_hvac_action"
      icon: mdi:air-conditioner
      state: "{{ state_attr('climate.workshop', 'hvac_action') }}"
