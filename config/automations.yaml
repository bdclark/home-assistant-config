- id: '1774121709338'
  alias: SofaBaton - Living Room Activity Control
  description: Routes SofaBaton X2 activity selections to HA scripts. 101=Apple TV
    102=Plex/Shield 255=All Off
  triggers:
  - topic: activity/80B54E798A70/activity_control_up
    trigger: mqtt
  actions:
  - choose:
    - conditions:
        condition: template
        value_template: '{{ trigger.payload_json.activity_id == 101 }}'
      sequence:
      - action: script.avr_turn_on_with_source
        data:
          source: Apple TV
      - action: media_player.turn_on
        target:
          entity_id: media_player.living_room_apple_tv
    - conditions:
        condition: template
        value_template: '{{ trigger.payload_json.activity_id == 102 }}'
      sequence:
      - action: script.avr_turn_on_with_source
        data:
          source: Shield
      - action: script.shield_launch_plex
    - conditions:
        condition: template
        value_template: '{{ trigger.payload_json.activity_id == 255 }}'
      sequence:
      - action: script.living_room_all_off
  mode: restart
- id: '1774122871910'
  alias: SofaBaton - Living Room Device Commands
  description: Routes SofaBaton X2 HA remote device button presses to HA entities.
    Device 4, Key 1 = Shades, Device 4, Key 2 = Movie Lighting.
  triggers:
  - topic: 80B54E798A70/up
    trigger: mqtt
  actions:
  - choose:
    - alias: Key 1 - Shades
      conditions:
        condition: template
        value_template: '{{ trigger.payload_json.device_id == 4 and trigger.payload_json.key_id
          == 1 }}'
      sequence:
      - action: button.press
        target:
          entity_id: button.house_living_room_media_wall_position_3_keypad_shades
    - alias: Key 2 - Movie Lighting
      conditions:
        condition: template
        value_template: '{{ trigger.payload_json.device_id == 4 and trigger.payload_json.key_id
          == 2 }}'
      sequence:
      - action: button.press
        target:
          entity_id: button.house_living_room_media_wall_position_3_keypad_movie
  mode: parallel
- id: '1775851381766'
